<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGIFY TECH | Pro Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0f15; --cyan: #00f2ff; --pink: #ff00ff; --green: #00ff88; --gold: #ffd700; --card: #161b22; --red: #ff4a4a; --dark: #0d1117; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        .promo-banner { background: var(--pink); color: white; text-align: center; padding: 8px; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* BANNER BLACK FRIDAY */
        #bf-highlight { display: none; background: linear-gradient(90deg, #000, #220022); border-bottom: 3px solid var(--pink); padding: 25px 5%; align-items: center; justify-content: center; gap: 30px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px var(--pink); } to { box-shadow: 0 0 20px var(--pink); } }
        
        header { padding: 12px 5%; background: rgba(13, 17, 23, 0.95); border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 999; backdrop-filter: blur(10px); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        
        .search-container { flex: 1; max-width: 300px; position: relative; }
        .search-container input { width: 100%; padding: 10px 40px 10px 15px; background: #0d1117; border: 1px solid #333; border-radius: 20px; color: white; outline: none; }
        
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--dark); border-right: 1px solid #333; z-index: 2005; transition: 0.4s; padding: 30px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .cat-btn-side { width: 100%; background: #1c2128; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; cursor: pointer; text-align: left; margin-bottom: 8px; }

        .container { padding: 30px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 18px; padding: 15px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--cyan); transform: translateY(-5px); }
        
        .ribbon-off { position: absolute; bottom: 10px; right: -30px; background: var(--green); color: black; font-weight: bold; font-size: 11px; padding: 5px 35px; transform: rotate(-45deg); z-index: 10; }
        .img-box { width: 100%; height: 200px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        #adm-panel { display: none; padding: 30px; background: var(--dark); border: 2px solid var(--gold); margin: 20px 5%; border-radius: 20px; }
        .modal-prod { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { max-width: 800px; width: 95%; background: var(--card); border-radius: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; padding: 30px; border: 1px solid var(--cyan); position: relative; }
        
        .btn-buy { width: 100%; padding: 15px; background: var(--pink); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /* FOOTER E SELOS */
        .footer-badges { display: flex; justify-content: center; gap: 20px; padding: 20px; flex-wrap: wrap; opacity: 0.6; border-top: 1px solid #333; margin-top: 30px; }
        .badge-item { font-size: 24px; display: flex; align-items: center; gap: 8px; font-size: 12px; text-transform: uppercase; }
        footer { padding: 20px 5%; text-align: center; color: #555; font-size: 13px; }
        
        /* LISTA ADM */
        .adm-list-item { display: flex; justify-content: space-between; align-items: center; background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; }
        
        @media (max-width: 768px) { .modal-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="promo-banner">🔥 AGIFY TECH - O SEU UNIVERSO GEEK PARTICULAR</div>
    
    <div id="bf-highlight">
        <div style="width: 100px; height: 100px; border: 1px solid var(--pink); border-radius: 10px; overflow: hidden;">
            <img id="bf-img" src="" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div>
            <h2 id="bf-title" style="margin:0"></h2>
            <div id="countdown" style="color:var(--pink); font-family:monospace; font-size: 20px;"></div>
            <button id="bf-link" class="btn-buy" style="width:auto; margin-top:10px;">VER OFERTA</button>
        </div>
    </div>

    <header>
        <div class="nav-top">
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="fas fa-bars" onclick="toggleSidebar()" style="color:var(--cyan); cursor:pointer;"></i>
                <div onclick="location.reload()" style="cursor:pointer; font-size:20px; font-weight:bold;">
                    <span style="color:var(--cyan);">AGIFY</span><span style="color:var(--pink);">TECH</span>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="input-busca" placeholder="Buscar..." oninput="buscarProdutos()">
            </div>
            <div style="display:flex; gap:15px;">
                <i class="fas fa-user-circle" onclick="abrirPortalCLT()" style="color:var(--cyan); cursor:pointer;"></i>
                <i class="fas fa-cog" onclick="abrirLoginAdm()" style="color:var(--gold); cursor:pointer;"></i>
            </div>
        </div>
    </header>

    <div class="sidebar" id="sidebar-menu">
        <h3 style="color:var(--cyan);">Categorias</h3>
        <div id="menu-categorias"></div>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:20px;">Fechar</button>
    </div>

    <div id="adm-panel">
        <h2 style="color:var(--gold);">Painel Administrativo</h2>
        <div id="form-adm" style="background:#1c2128; padding:20px; border-radius:15px; margin-bottom: 20px;">
            <input type="hidden" id="p-id">
            <input type="text" id="p-nome" placeholder="Nome do Produto">
            <input type="text" id="p-preco" placeholder="Preço (ex: 89,90)">
            <input type="text" id="p-link" placeholder="Link da Loja">
            <input type="text" id="p-off" placeholder="% Desconto (opcional)">
            <input type="text" id="p-imgs" placeholder="Link da Imagem">
            <textarea id="p-desc" placeholder="Descrição"></textarea>
            <div id="btn-container-adm">
                <button onclick="salvarProduto()" class="btn-buy" style="background:var(--green); color:black;">CADASTRAR NOVO</button>
            </div>
        </div>

        <h3 style="color:var(--cyan);">Gerenciar Produtos</h3>
        <div id="lista-adm-produtos" style="max-height: 300px; overflow-y: auto; background: #1c2128; padding: 10px; border-radius: 10px;">
            </div>

        <button onclick="logoff()" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:20px;">Sair do Painel</button>
    </div>

    <div class="container" id="grid"></div>

    <div id="modal-login" class="modal-prod">
        <div style="background:var(--card); padding:30px; border-radius:20px; border:1px solid var(--gold);">
            <input type="password" id="adm-pass" placeholder="Senha Admin">
            <button onclick="loginAdm()" class="btn-buy" style="background:var(--gold); color:black;">ENTRAR</button>
            <button onclick="fecharModais()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <div id="modal-produto" class="modal-prod">
        <div class="modal-content">
            <div class="img-box"><img id="m-img-main" src=""></div>
            <div>
                <h2 id="m-nome"></h2>
                <h3 id="m-preco" style="color:var(--cyan);"></h3>
                <p id="m-desc"></p>
                <button id="btn-comprar" class="btn-buy">IR PARA LOJA</button>
                <button onclick="fecharModais()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Fechar</button>
            </div>
        </div>
    </div>

    <div class="footer-badges">
        <div class="badge-item"><i class="fas fa-shield-alt" style="color:var(--green)"></i> Site Seguro</div>
        <div class="badge-item"><i class="fab fa-cc-visa"></i></div>
        <div class="badge-item"><i class="fab fa-cc-mastercard"></i></div>
        <div class="badge-item"><i class="fas fa-pix" style="color:var(--cyan)"></i> Pix</div>
        <div class="badge-item"><i class="fas fa-lock"></i> SSL</div>
    </div>

    <footer><p>&copy; 2026 AGIFY TECH</p></footer>

    <script>
        const SUPABASE_URL = 'https://ddbyznixijrkqpouqvkd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkYnl6bml4aWpya3Fwb3VxdmtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjA5NzYsImV4cCI6MjA4NzY5Njk3Nn0.CQIxKlpyaZwyVb43qRJuKSDYa1xzFdQwkrkYVW_G4AM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let produtosFull = [];
        const cats = ['Funko', 'Action Figure', 'Geek', 'Smartwatches'];

        async function init() {
            const { data, error } = await _supabase.from('produtos').select('*').order('created_at', { ascending: false });
            if (error) console.error("Erro Supabase:", error);
            produtosFull = data || [];
            renderCats();
            renderGrid(produtosFull);
            if(sessionStorage.getItem('adm_on') === 'true') {
                document.getElementById('adm-panel').style.display = 'block';
                renderListaAdm();
            }
        }

        function renderGrid(list) {
            document.getElementById('grid').innerHTML = list.map(p => `
                <div class="card" onclick="verDetalhes('${p.id}')">
                    ${p.url_extra2 ? `<div class="ribbon-off">${p.url_extra2}% OFF</div>` : ''}
                    <div class="img-box"><img src="${p.img.split(',')[0]}"></div>
                    <h3 style="font-size:14px; margin: 10px 0 5px 0;">${p.name}</h3>
                    <p style="color:var(--cyan); font-weight:bold; margin:0;">R$ ${p.price}</p>
                </div>
            `).join('');
        }

        function renderListaAdm() {
            document.getElementById('lista-adm-produtos').innerHTML = produtosFull.map(p => `
                <div class="adm-list-item">
                    <span>${p.name}</span>
                    <div>
                        <button onclick="prepararEdicao('${p.id}')" style="background:var(--cyan); border:none; padding:5px 10px; border-radius:5px; cursor:pointer; margin-right:5px;"><i class="fas fa-edit"></i></button>
                        <button onclick="excluirProduto('${p.id}')" style="background:var(--red); border:none; padding:5px 10px; border-radius:5px; cursor:pointer; color:white;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function prepararEdicao(id) {
            const p = produtosFull.find(x => x.id == id);
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-nome').value = p.name;
            document.getElementById('p-preco').value = p.price;
            document.getElementById('p-link').value = p.url;
            document.getElementById('p-imgs').value = p.img;
            document.getElementById('p-desc').value = p.description;
            document.getElementById('p-off').value = p.url_extra2 || '';
            
            document.getElementById('btn-container-adm').innerHTML = `
                <button onclick="atualizarProduto()" class="btn-buy" style="background:var(--gold); color:black; margin-bottom:5px;">SALVAR ALTERAÇÕES</button>
                <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer; width:100%;">Cancelar Edição</button>
            `;
            window.scrollTo(0,0);
        }

        async function atualizarProduto() {
            const id = document.getElementById('p-id').value;
            const d = { 
                name: document.getElementById('p-nome').value, 
                price: document.getElementById('p-preco').value, 
                url: document.getElementById('p-link').value, 
                img: document.getElementById('p-imgs').value, 
                description: document.getElementById('p-desc').value,
                url_extra2: document.getElementById('p-off').value
            };
            const { error } = await _supabase.from('produtos').update(d).eq('id', id);
            if(!error) location.reload();
        }

        async function excluirProduto(id) {
            if(confirm("Tem certeza que deseja excluir este produto?")) {
                const { error } = await _supabase.from('produtos').delete().eq('id', id);
                if(!error) location.reload();
            }
        }

        function verDetalhes(id) {
            const p = produtosFull.find(x => x.id == id);
            document.getElementById('m-nome').innerText = p.name;
            document.getElementById('m-preco').innerText = `R$ ${p.price}`;
            document.getElementById('m-desc').innerText = p.description;
            document.getElementById('m-img-main').src = p.img.split(',')[0];
            document.getElementById('btn-comprar').onclick = () => window.open(p.url, '_blank');
            document.getElementById('modal-produto').style.display = 'flex';
        }

        async function salvarProduto() {
            const d = { 
                name: document.getElementById('p-nome').value, 
                price: document.getElementById('p-preco').value, 
                url: document.getElementById('p-link').value, 
                img: document.getElementById('p-imgs').value, 
                description: document.getElementById('p-desc').value,
                url_extra2: document.getElementById('p-off').value
            };
            const { error } = await _supabase.from('produtos').insert([d]);
            if(!error) location.reload();
        }

        function renderCats() {
            document.getElementById('menu-categorias').innerHTML = ['Todos', ...cats].map(c => `<button class="cat-btn-side" onclick="filtrarCat('${c}')">${c}</button>`).join('');
        }

        function filtrarCat(c) {
            const f = (c === 'Todos') ? produtosFull : produtosFull.filter(p => p.category === c);
            renderGrid(f);
            toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar-menu').classList.toggle('active'); }
        function abrirLoginAdm() { document.getElementById('modal-login').style.display = 'flex'; }
        function abrirPortalCLT() { alert('Portal em manutenção!'); }
        function fecharModais() { document.querySelectorAll('.modal-prod').forEach(m => m.style.display = 'none'); }
        function loginAdm() { if(document.getElementById('adm-pass').value === '080523') { sessionStorage.setItem('adm_on', 'true'); location.reload(); } }
        function logoff() { sessionStorage.removeItem('adm_on'); location.reload(); }
        function buscarProdutos() {
            const t = document.getElementById('input-busca').value.toLowerCase();
            renderGrid(produtosFull.filter(p => p.name.toLowerCase().includes(t)));
        }

        init();
    </script>
</body>
</html>
